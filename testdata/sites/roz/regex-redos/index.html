<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Roz regex backtracking</title>
  </head>
  <body>
    <h1>Regex backtracking fixture</h1>
    <pre id="out"></pre>
    <script>
      const pattern = /(a+)+$/;
      const input = "a".repeat(3000) + "!";
      const start = Date.now();
      const matched = pattern.test(input);
      const elapsed = Date.now() - start;
      document.getElementById("out").textContent =
        "matched=" + matched + ", elapsedMs=" + elapsed;
    </script>
  </body>
</html>
