<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Roz CPU burn</title>
  </head>
  <body>
    <h1>CPU burn fixture</h1>
    <p id="state">running...</p>
    <script>
      let acc = 0;
      const start = Date.now();
      while (Date.now() - start < 4000) {
        for (let i = 0; i < 50000; i++) {
          acc += Math.sqrt(i + acc % 13);
        }
      }
      document.getElementById("state").textContent = "done " + acc.toFixed(0);
    </script>
  </body>
</html>
