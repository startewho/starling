<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Roz deep DOM</title>
  </head>
  <body>
    <h1>Deep DOM nesting fixture</h1>
    <div id="root"></div>
    <script>
      const root = document.getElementById("root");
      let cursor = root;
      for (let i = 0; i < 3000; i++) {
        const next = document.createElement("div");
        next.className = "n-" + i;
        cursor.appendChild(next);
        cursor = next;
      }
      cursor.textContent = "deep tail";
    </script>
  </body>
</html>
