<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starling — an independent web browser, built from scratch</title>
  <meta name="description" content="Starling is an independent web browser built from scratch in .NET. No Chromium, Gecko, or WebKit.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Starling — an independent web browser">
  <meta property="og:description" content="Built from scratch in .NET. No Chromium, Gecko, or WebKit.">
  <meta property="og:image" content="img/screenshot.png">

  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Starling</span>
    </a>
    <nav class="nav">
      <a class="nav-cta" href="https://github.com/starling-browser/starling">GitHub</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="badge">Experimental · Written in .NET</p>
      <h1>An independent web browser,<br>built from scratch.</h1>
      <p class="lede">
        No Chromium. No Gecko. No WebKit. Starling is a brand-new browser
        engine, written in .NET and built in the open.
      </p>
      <div class="cta-row">
        <a class="btn btn-primary" href="https://github.com/starling-browser/starling">View on GitHub</a>
        <a class="btn btn-ghost" href="https://github.com/starling-browser/starling/blob/main/docs/approach.md">Read the approach</a>
      </div>
    </section>

    <section class="shot">
      <figure>
        <img src="img/screenshot.png" alt="Starling rendering a live website in its desktop shell" loading="lazy">
        <figcaption>
          Starling rendering netclaw.dev — an Astro and Redux-Toolkit site — in
          its desktop shell. The site is shown only as a rendering target.
        </figcaption>
      </figure>
    </section>

  </main>
</body>
</html>
