name: "CLA Assistant"

# Asks first-time contributors to sign the Contributor License Agreement.
# The ICLA and CCLA text and the signature record live in the separate
# starling-browser/cla repo. Storing signatures there needs a token with
# write access to that repo: add it as the PERSONAL_ACCESS_TOKEN secret on
# this repo (a classic PAT with `repo` scope, or a fine-grained PAT with
# Contents read/write on starling-browser/cla).
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# pull_request_target runs with the base repo's secrets, so this is safe for
# fork PRs. The action needs write access to comment and set the PR status.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Pinned to a full commit SHA for supply-chain safety; bump deliberately.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Needed because the signatures file lives in another repo.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where the signature record is stored, in the remote cla repo.
          path-to-signatures: 'signatures/version1/cla.json'
          remote-organization-name: 'starling-browser'
          remote-repository-name: 'cla'
          branch: 'main'
          # The agreement contributors are asked to sign. Corporate
          # contributors should also read ccla.md in the same repo.
          path-to-document: 'https://github.com/starling-browser/cla/blob/main/icla.md'
          # Maintainers and bots that never need to sign.
          allowlist: dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: 'Thank you for your contribution. Before we can merge it, please read our [Contributor License Agreement](https://github.com/starling-browser/cla/blob/main/icla.md) (corporate contributors see [ccla.md](https://github.com/starling-browser/cla/blob/main/ccla.md)) and sign it by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
