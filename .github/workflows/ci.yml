name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build-and-test (${{ matrix.os }})
    # Fork PRs get no secrets here, so the license-gated build can't pass.
    # They are handled by the gated fork-ci.yml instead; run this only for
    # pushes and same-repo PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      matrix:
        os: [macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      SIXLABORS_LICENSE_KEY: ${{ secrets.SIXLABORS_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # lib/starling-regexp is a submodule; the build fails without it.
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install native codec libs (Linux)
        if: runner.os == 'Linux'
        # Starling.Codecs' Linux decoder tests dlopen these at runtime; the
        # ubuntu runner does not ship libwebp by default.
        run: sudo apt-get update && sudo apt-get install -y libpng16-16 libjpeg-turbo8 libwebp7
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test (unit)
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test.trx"
      - name: Test (Jint alt-engine — Engine suite under STARLING_JS_ENGINE=jint)
        # The default test run above exercises the in-house Starling.Js backend.
        # Jint is a runtime-selectable alternative (a temporary compat crutch);
        # re-run the engine integration suite against it so the alt backend can
        # never silently regress. The Jint backend's own unit tests
        # (Starling.Bindings.Jint.Tests) already ran in the default step.
        env:
          STARLING_JS_ENGINE: jint
        run: dotnet test tests/Starling.Engine.Tests/Starling.Engine.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-jint.trx"
      - name: Test (golden-image)
        run: dotnet test --no-build -c Release --filter Category=GoldenImage
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/*.trx'

  lint:
    name: lint (formatting + interop policy)
    runs-on: ubuntu-24.04
    env:
      SIXLABORS_LICENSE_KEY: ${{ secrets.SIXLABORS_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # lib/starling-regexp is a submodule; dotnet format compiles, so the
          # build graph still needs the submodule sources present.
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet format
        # Compiles, so needs the SixLabors license — skip on fork PRs (no
        # secret). The interop-policy grep below needs no build and still runs.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: dotnet format --verify-no-changes
      - name: interop seam policy — confine native interop
        # Interop seam policy: native LibraryImport/DllImport is confined to the
        # designated interop project — Starling.Codecs (image decode). Every
        # other engine project stays P/Invoke-free. Codecs is enforced-clean by
        # *omission* from the grep list below: it is simply never added. If the
        # Shell needs platform interop later, narrow this list rather than
        # relax the policy. The native Skia/Graphite shim that previously also
        # qualified as an interop seam was removed in wp:M5-skia-removal —
        # paint is now pure-managed via ImageSharp.Drawing 3.
        run: |
          set -e
          ! grep -rn --include='*.cs' 'DllImport\|LibraryImport' \
              src/Starling.Common/   \
              src/Starling.Url/      \
              src/Starling.Net/      \
              src/Starling.Html/     \
              src/Starling.Dom/      \
              src/Starling.Css/      \
              src/Starling.Layout/   \
              src/Starling.Paint/    \
              src/Starling.Js/       \
              src/Starling.Js.Hosting/    \
              src/Starling.Bindings/ \
              src/Starling.Bindings.Jint/ \
              src/Starling.Loop/     \
              src/Starling.Engine/

  # Live-network acceptance for the M2 exit demo (wp:M2-07b). Opt-in via
  # STARLING_ALLOW_NETWORK=1 so the main matrix is not at the mercy of
  # third-party hosts. Linux-only: the live golden under
  # testdata/golden/live/example.com.png is pinned to one rasteriser.
  network-tests:
    name: network-tests (live HTTPS smoke)
    # License-gated build + live network: skip for fork PRs (no secrets); the
    # gated fork-ci.yml validates fork builds after review.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    env:
      STARLING_ALLOW_NETWORK: "1"
      SIXLABORS_LICENSE_KEY: ${{ secrets.SIXLABORS_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # lib/starling-regexp is a submodule; the build fails without it.
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test (live network)
        run: dotnet test --no-build -c Release --filter Category=NetworkLive --logger "trx;LogFileName=network-test.trx"
      - name: Upload network test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-test-results
          path: '**/network-test.trx'
