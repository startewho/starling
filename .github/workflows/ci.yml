name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build-and-test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install native codec libs (Linux)
        if: runner.os == 'Linux'
        # Tessera.Codecs' Linux decoder tests dlopen these at runtime; the
        # ubuntu runner does not ship libwebp by default.
        run: sudo apt-get update && sudo apt-get install -y libpng16-16 libjpeg-turbo8 libwebp7
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      # The native Skia shim (libtessera_skia.*) is a HARD REQUIREMENT — Skia
      # Graphite is the engine's sole rasterizer, there is no managed fallback.
      # Tessera.Skia.csproj has a BeforeTargets="Build" guard that fails the
      # build with an actionable error if the shim for the current OS is
      # missing, so `dotnet build` below cannot pass without it.
      #
      # The shim is built out-of-band by native.yml and is gitignored (never
      # committed). This step restores it from the most recent successful
      # native.yml run into the repo-root runtimes/<rid>/native tree that both
      # the csproj copy and NativeLoader probe.
      #
      # Coverage today: native.yml builds osx-arm64 only. The macos runner goes
      # green; ubuntu/windows will fail the Build step until the win-x64 and
      # linux-x64 native builds exist. That red is intentional and honest — it
      # reflects real missing platform support, not a CI gap to paper over.
      - name: Restore native Skia shim
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list --workflow native.yml --branch main \
            --status success --limit 1 --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$run_id" ]; then
            echo "No successful native.yml run found — cannot restore the Skia shim." >&2
            exit 1
          fi
          gh run download "$run_id" --dir native-artifacts
          mkdir -p runtimes
          # native.yml lays artifacts out as runtimes/<rid>/native/<lib>.
          cp -R native-artifacts/*/runtimes/. runtimes/ 2>/dev/null || \
            cp -R native-artifacts/runtimes/. runtimes/
          find runtimes -name 'libtessera_skia.*' -o -name 'tessera_skia.dll'
        shell: bash
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test (unit)
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test.trx"
      - name: Test (golden-image)
        run: dotnet test --no-build -c Release --filter Category=GoldenImage
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/*.trx'

  lint:
    name: lint (formatting + interop policy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet format
        run: dotnet format --verify-no-changes
      - name: interop seam policy — confine native interop
        # Interop seam policy: native LibraryImport/DllImport is confined to the
        # designated interop projects — Tessera.Skia and Tessera.Codecs. Every
        # other engine project stays P/Invoke-free. The two interop projects are
        # enforced-clean by *omission* from the grep list below: they are simply
        # never added. If the Shell needs platform interop later, narrow this
        # list rather than relax the policy.
        # NOTE: Tessera.Skia is forward-declared — the project lands in wp:M3-06h.
        run: |
          set -e
          ! grep -rn --include='*.cs' 'DllImport\|LibraryImport' \
              src/Tessera.Common/   \
              src/Tessera.Url/      \
              src/Tessera.Net/      \
              src/Tessera.Html/     \
              src/Tessera.Dom/      \
              src/Tessera.Css/      \
              src/Tessera.Layout/   \
              src/Tessera.Paint/    \
              src/Tessera.Js/       \
              src/Tessera.Bindings/ \
              src/Tessera.Loop/     \
              src/Tessera.Engine/

  # Live-network acceptance for the M2 exit demo (wp:M2-07b). Opt-in via
  # TESSERA_ALLOW_NETWORK=1 so the main matrix is not at the mercy of
  # third-party hosts. Linux-only: the live golden under
  # testdata/golden/live/example.com.png is pinned to one rasteriser.
  network-tests:
    name: network-tests (live HTTPS smoke)
    runs-on: ubuntu-24.04
    env:
      TESSERA_ALLOW_NETWORK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test (live network)
        run: dotnet test --no-build -c Release --filter Category=NetworkLive --logger "trx;LogFileName=network-test.trx"
      - name: Upload network test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-test-results
          path: '**/network-test.trx'
